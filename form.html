<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Product Review</h1>
        </div>
    </header>

    <main>
        <div class="form-container">
            <form action="review.html" method="get" class="review-form">

                <div class="form-group">
                    <label for="product-name" class="main-label">Product Name</label>
                    <select id="product-name" name="productName" required>
                        <option value="" disabled selected>Choose a Product ...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="main-label">Overall Rating</label>
                    <div class="rating-table">
                        <div class="rating-cell">
                            <label for="rating-1" class="star-label">&#9734;</label>
                            <input type="radio" id="rating-1" name="overallRating" value="1" required>
                        </div>
                        <div class="rating-cell">
                            <label for="rating-2" class="star-label">&#9734;&#9734;</label>
                            <input type="radio" id="rating-2" name="overallRating" value="2" required>
                        </div>
                        <div class="rating-cell">
                            <label for="rating-3" class="star-label">&#9734;&#9734;&#9734;</label>
                            <input type="radio" id="rating-3" name="overallRating" value="3" required>
                        </div>
                        <div class="rating-cell">
                            <label for="rating-4" class="star-label">&#9734;&#9734;&#9734;&#9734;</label>
                            <input type="radio" id="rating-4" name="overallRating" value="4" required>
                        </div>
                        <div class="rating-cell">
                            <label for="rating-5" class="star-label">&#9734;&#9734;&#9734;&#9734;&#9734;</label>
                            <input type="radio" id="rating-5" name="overallRating" value="5" required>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="installation-date" class="main-label">Date of Installation</label>
                    <input type="date" id="installation-date" name="installationDate" required>
                </div>

                <div class="form-group">
                    <label class="main-label">Which features did you find useful in the product?<br><span
                            class="instructions">(Check all that apply)</span></label>
                    <div class="checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="feature-durability" name="features" value="durability">
                            <label for="feature-durability">Durability</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="feature-ease" name="features" value="ease-of-use">
                            <label for="feature-ease">Ease of Use</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="feature-performance" name="features" value="performance">
                            <label for="feature-performance">Performance</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="feature-design" name="features" value="design">
                            <label for="feature-design">Design</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="written-review" class="main-label">Written Review <span
                            class="optional">(Optional)</span></label>
                    <textarea id="written-review" name="writtenReview" rows="5"
                        placeholder="Share your experience with this product..."></textarea>
                </div>

                <div class="form-group">
                    <label for="user-name" class="main-label">Your Name <span class="optional">(Optional)</span></label>
                    <input type="text" id="user-name" name="userName" placeholder="e.g., Alex Smith">
                </div>

                <div class="form-actions">
                    <input type="submit" value="Post Review" class="submit-button">
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy;<span id="year"></span> &#127802; Simeon Obianwa &#127802;</p>
            <p>Nigeria</p>
            <p class="modification">Last Modification: <span id="current-datetime"></span></p>
        </div>
    </footer>
</body>

</html>
