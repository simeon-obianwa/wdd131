<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Confirmation</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/review.js" defer></script>
</head>

<body>
    <header>
        <div class="header-container">
            <h1>Review Confirmation</h1>
        </div>
    </header>

    <main>
        <div class="form-container confirmation-card">
            <div class="success-icon">&#10004;</div>
            <h2>Thank You for Your Feedback!</h2>
            <p class="confirmation-message">Your review has been successfully processed. Your data helps us improve
                product quality and consumer insights.</p>

            <div class="counter-display">
                <p class="counter-text">Total Reviews Completed:</p>
                <div id="review-counter" class="counter-badge">0</div>
            </div>

            <div class="form-actions">
                <a href="form.html" class="action-link-btn">Submit Another Review</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy;<span id="year"></span> &#127802; Simeon Obianwa &#127802;</p>
            <p>Nigeria</p>
            <p class="modification">Last Modification: <span id="current-datetime"></span></p>
        </div>
    </footer>
</body>

</html>
