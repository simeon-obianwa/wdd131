<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Initiate a consultation with IMS Consultants to coordinate facility gap analysis tracking, regulatory reviews, or preliminary certification reviews.">
    <meta name="author" content="IMS Consultants Corporate Web Development Division">
    <title>IMS Consultants | Request Systems Consultation</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script src="scripts/main.js"></script>
</head>

<body>

    <header>
        <nav class="nav-container">
            <div class="logo-text">IMS Consultants</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="about.html" class="nav-link">About</a></li>
                <li><a href="reviews.html" class="nav-link">Reviews</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-box">
            <h2>Service Advisory Form</h2>
            <p class="subheading-context">Complete the information request below to enable our team contact you within
                24 hours.</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="contactRepresentative">Your Legal Names</label>
                    <input type="text" id="contactRepresentative" class="input-field"
                        placeholder="e.g., Chief Executive Officer" required>
                </div>

                <div class="form-group">
                    <label for="contactBusinessMail">Corporate Business Email</label>
                    <input type="email" id="contactBusinessMail" class="input-field" placeholder="john.mary@company.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="targetedStandard">Services Portfolio</label>
                    <select id="targetedStandard" class="input-field" required>
                        <option value="" disabled selected>Select from the list...</option>
                        <option value="qms">ISO 9001 / Quality Management System</option>
                        <option value="fsms">ISO 22000 / HACCP Food Safety Management</option>
                        <option value="is">ISO 27001 / Information Management Systems and Cyber Security</option>
                        <option value="esg">Environmental Stewardship &amp; ESG Frameworks</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="facilityContext">Service Request Description</label>
                    <textarea id="facilityContext" class="input-field" rows="4"
                        placeholder="Briefly your service request scope..." required></textarea>
                </div>

                <button type="submit" class="action-button">Submit Request</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 IMS Consultants | Lagos, Nigeria.</p>
        <p id="footer-time-display">Initializing runtime parameter tracks...</p>
        <div class="footer-nav">
            <a href="references.html" class="footer-link">Asset and Image References</a>
        </div>
    </footer>

</body>

</html>
